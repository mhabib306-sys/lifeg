name: Homebase
options:
  bundleIdPrefix: com.homebase
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Homebase:
    type: application
    platform: iOS
    sources:
      - Homebase
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.homebase.app
        MARKETING_VERSION: "1.1.1"
        CURRENT_PROJECT_VERSION: "3"
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        SUPPORTED_INTERFACE_ORIENTATIONS~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Homebase/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: true
        CFBundleIconName: AppIcon

  HomebaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HomebaseTests
    dependencies:
      - target: Homebase
    settings:
      base:
        SWIFT_VERSION: "6.0"
